<script>
const C16 = 2*Math.PI*15;
const COLORS=['#00ff88','#33aaff','#ff6633','#cc44ff','#ffcc00','#00ccff','#ff3366','#44ff88','#ff9900','#aa44ff','#00ffcc','#ff4488','#33ff99','#6699ff','#ffaa33','#44ccff'];
const WEEKS=[
  {id:1,phase:'PHASE 1 — FOUNDATION',title:'Linux + Git',tasks:['Install Ubuntu 22.04 dual boot on your laptop','Terminal basics — navigation, files, permissions, bash commands','Git init, add, commit, push — create your first GitHub repo','SSH, file editing with vim/nano, writing basic bash scripts','Set up VS Code on Ubuntu, connect to GitHub, push a Hello World project']},
  {id:2,phase:'PHASE 1 — FOUNDATION',title:'C++ Basics',tasks:['Variables, data types, input/output, conditionals in C++','Loops, functions, arrays','Pointers and references — understand memory management','Structs and basic file I/O','Build project: command line calculator in C++. Push to GitHub']},
  {id:3,phase:'PHASE 1 — FOUNDATION',title:'C++ OOP',tasks:['Classes and objects in C++','Constructors, destructors, access modifiers','Inheritance and polymorphism','Templates and basic STL — vectors, maps','Build project: robot joint class system in C++. Push to GitHub']},
  {id:4,phase:'PHASE 1 — FOUNDATION',title:'C++ Advanced + Review',tasks:['Smart pointers and memory management in depth','Multithreading basics in C++','CMake basics — how to build C++ projects properly','Makefiles and professional project structure','Review weeks 1–4. Clean all GitHub repos. Write proper READMEs']},
  {id:5,phase:'PHASE 2 — ROBOTICS CORE',title:'Python for Robotics',tasks:['Python OOP revision — classes, inheritance','NumPy — arrays, matrix operations, dot products','Matplotlib — plot graphs and visualize data','Serial communication in Python using pyserial','Build project: read and plot fake sensor data. Push to GitHub']},
  {id:6,phase:'PHASE 2 — ROBOTICS CORE',title:'ROS2 Part 1',tasks:['Install ROS2 Humble on Ubuntu. Understand what ROS2 actually is','Nodes, topics, messages — theory + first Hello World node','Write a publisher node in Python','Write a subscriber node in Python','Publisher + subscriber talking to each other. Push to GitHub']},
  {id:7,phase:'PHASE 2 — ROBOTICS CORE',title:'ROS2 Part 2',tasks:['Services and clients in ROS2','Parameters and launch files','ROS2 with C++ — rewrite publisher/subscriber in C++','TF2 — coordinate transforms (critical for robotics)','Build a full ROS2 package from scratch with launch file. Push to GitHub']},
  {id:8,phase:'PHASE 2 — ROBOTICS CORE',title:'Robot Math',tasks:['Linear algebra — vectors, matrices, dot product, cross product','Rotation matrices, euler angles, quaternions','Forward kinematics — how joint angles become position','Inverse kinematics — basics and geometric approach','Build: forward kinematics for 2-joint arm in Python. Push to GitHub']},
  {id:9,phase:'PHASE 3 — CONTROL + SIMULATION',title:'Control Theory',tasks:['What is a control system — open loop vs closed loop','PID controller — P, I, D terms explained from scratch','Implement PID in Python from scratch (no libraries)','Tune PID on a simulated system (mass spring damper)','Build: PID controller balancing a virtual pendulum. Push to GitHub']},
  {id:10,phase:'PHASE 3 — CONTROL + SIMULATION',title:'Gazebo + URDF',tasks:['Install Gazebo. Understand what simulation means in robotics','URDF — how to describe a robot in XML','Build a 2-joint robot arm in URDF','Spawn your URDF robot in Gazebo','Connect ROS2 to your Gazebo robot. Push to GitHub']},
  {id:11,phase:'PHASE 3 — CONTROL + SIMULATION',title:'Quadruped Sim — Part 1',tasks:['Study quadruped gait theory — trot, walk, crawl gaits','Build quadruped URDF — 4 legs, 12 joints','Spawn quadruped in Gazebo','Write basic joint controller in ROS2','Get one leg moving with position control. Push to GitHub']},
  {id:12,phase:'PHASE 3 — CONTROL + SIMULATION',title:'Quadruped Sim — Part 2 🏆',tasks:['Implement basic standing position for the quadruped','Implement trot gait — 2 legs move at a time','Add IMU sensor simulation in Gazebo','Read IMU data in ROS2','🏆 Polish sim, record demo video, write README. PROJECT 1 DONE.']},
  {id:13,phase:'PHASE 4 — HARDWARE + SHIP',title:'Embedded Systems',tasks:['Arduino/Teensy basics — GPIO, digital, analog read/write','PWM — controlling servo motors precisely','UART communication between microcontroller and laptop','I2C — reading an IMU sensor (MPU6050)','Build: read IMU data and send over serial to Python. Push to GitHub']},
  {id:14,phase:'PHASE 4 — HARDWARE + SHIP',title:'Hardware Project Begins',tasks:['Design a 2DOF robot arm (2 servo motors) — plan on paper','Wire servos to Arduino/Teensy','Control arm position from Python over serial','Implement inverse kinematics — control arm with XY coordinates','Get arm moving accurately to target positions. Push to GitHub']},
  {id:15,phase:'PHASE 4 — HARDWARE + SHIP',title:'Hardware Project Polish 🏆',tasks:['Add PID control to arm joints for smooth movement','Build a simple mount or enclosure for the arm','Record a proper demo video showing the arm working','Write full documentation — circuit diagram, how it works, code explained','🏆 PROJECT 2 DONE. Push everything to GitHub']},
  {id:16,phase:'PHASE 4 — HARDWARE + SHIP',title:'Resume + Applications 🚀',tasks:['Polish both GitHub repos — READMEs, photos, videos, diagrams','Build your resume — 1 page, skills + projects + education only','Write your SOP — why robotics, what you built, where you want to go','Find 10 IISc/IIT professors in robotics. Draft cold emails','🚀 Send emails. Apply IAS SRFP. Apply ISRO. Apply IIT SURGE.']},
];

let S={};
try{S=JSON.parse(localStorage.getItem('rmv3')||'{}');}catch(e){}
function save(){localStorage.setItem('rmv3',JSON.stringify(S));}

let openMap={};

function k(w,i){return w+'_'+i;}

function prog(w){
  const done=w.tasks.filter((_,i)=>S[k(w.id,i)]).length;
  return{done,total:w.tasks.length,pct:Math.round(done/w.tasks.length*100)};
}

function stats(){
  let d=0,t=0,wd=0;
  WEEKS.forEach(w=>{const p=prog(w);d+=p.done;t+=p.total;if(p.done===p.total)wd++;});
  const pct=t?Math.round(d/t*100):0;
  document.getElementById('pct').innerHTML=pct+'<span>%</span>';
  document.getElementById('mb').style.width=pct+'%';
  document.getElementById('dc').textContent=d;
  document.getElementById('wd').textContent=wd;
}

function render(){
  let html='';
  let lastPhase='';
  WEEKS.forEach(w=>{
    const col=COLORS[w.id-1];
    const {done,total,pct}=prog(w);
    const isOpen=!!openMap[w.id];
    const isComplete=done===total;
    const offset=C16-(pct/100)*C16;
    if(w.phase!==lastPhase){
      lastPhase=w.phase;
      html+=`<div class="phase-header"><div class="phase-line"></div><div class="phase-name">${w.phase}</div><div class="phase-line"></div></div>`;
    }
    const tasksHtml=w.tasks.map((t,i)=>{
      const isDone=S[k(w.id,i)];
      return `<div class="task${isDone?' done':''}" onclick="tick(${w.id},${i})">
        <div class="task-check"><svg class="chk" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#0a0a0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="task-body"><div class="task-day">Day ${i+1}</div><div class="task-text">${t}</div></div>
      </div>`;
    }).join('');
    html+=`<div class="week-card${isComplete?' week-complete':''}${isOpen?' open':''}" id="wk${w.id}">
      <div class="week-header" onclick="toggleW(${w.id})">
        <div class="week-num">WK ${String(w.id).padStart(2,'0')}</div>
        <div class="week-dot" style="background:${col}"></div>
        <div class="week-title">${w.title}</div>
        <div class="week-ring">
          <svg width="40" height="40" viewBox="0 0 40 40">
            <circle class="ring-bg" cx="20" cy="20" r="15"/>
            <circle class="ring-fg" cx="20" cy="20" r="15" stroke="${col}" stroke-dasharray="${C16}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-label">${pct}%</div>
        </div>
        <div class="week-arrow">▾</div>
      </div>
      <div class="week-pbar"><div class="week-pbar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="tasks">${tasksHtml}</div>
    </div>`;
  });
  document.getElementById('root').innerHTML=html;
  stats();
}

function toggleW(id){
  openMap[id]=!openMap[id];
  render();
}

function tick(wid,ti){
  S[k(wid,ti)]=!S[k(wid,ti)];
  save();
  render();
}

render();
</script>

  <script>
    if('serviceWorker' in navigator){
      const swCode = `
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open('roadmap-v1').then(cache => cache.addAll([location.href]))
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});`;
      const blob = new Blob([swCode], {type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
  </script>
